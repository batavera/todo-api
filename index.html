<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Todo API</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Todo com API</h1>

    <p id="loading">Carregando...</p>
    <p id="error" style="display: none;">Erro ao carregar</p>

<div class="form">
  <input type="text" id="task-input" placeholder="Nova tarefa">
  <button id="add-btn">Adicionar</button>
</div>

<p id="message"></p>
<p id="task-count"></p>

<div class="filters">
  <button id="filter-all">Todas</button>
  <button id="filter-pending">Pendentes</button>
  <button id="filter-completed">Concluídas</button>
  <button id="clear-all">Limpar tudo</button>
</div>

<ul id="task-list"></ul>

  <script src="main.js"></script>
</body>
</html>
